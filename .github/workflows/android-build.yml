name: Android Build

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: nicknovitski/nix-develop@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode release keystore
        id: decode-keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          keytool -list \
            -keystore android/app/release.keystore \
            -storepass "$RELEASE_STORE_PASSWORD" \
            -alias "$RELEASE_KEY_ALIAS" > /dev/null 2>&1
          echo "verified=true" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        id: debug-build
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        if: steps.decode-keystore.outputs.verified == 'true'
        working-directory: android
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        if: always() && steps.debug-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        if: steps.decode-keystore.outputs.verified == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
