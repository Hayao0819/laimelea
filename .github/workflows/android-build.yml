name: Android Build

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.variant }} APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debug
            gradle-task: assembleDebug
            gradle-flags: -PreactNativeArchitectures=arm64-v8a
            apk-path: android/app/build/outputs/apk/debug/app-debug.apk
            artifact-name: app-debug
          - variant: release
            gradle-task: assembleRelease
            gradle-flags: ""
            apk-path: android/app/build/outputs/apk/release/app-release.apk
            artifact-name: app-release
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: false

      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: nicknovitski/nix-develop@v1

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store-path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Decode release keystore
        id: decode-keystore
        if: matrix.variant == 'release' && env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
        run: |
          if echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore 2>/dev/null && \
             keytool -list \
               -keystore android/app/release.keystore \
               -storepass "$RELEASE_STORE_PASSWORD" \
               -alias "$RELEASE_KEY_ALIAS" > /dev/null 2>&1; then
            echo "verified=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Release keystore verification failed — skipping release build"
            rm -f android/app/release.keystore
          fi

      - name: Build APK
        id: build
        if: matrix.variant == 'debug' || steps.decode-keystore.outputs.verified == 'true'
        working-directory: android
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew ${{ matrix.gradle-task }} ${{ matrix.gradle-flags }}

      - name: Upload APK
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.apk-path }}
          retention-days: 7
