<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 108 108"
     width="108"
     height="108">

  <title>Laimelea - Thousand Winds</title>
  <desc>Clock with triskelion wind spirals — the thousand winds of time</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1929"/>
      <stop offset="100%" stop-color="#162438"/>
    </linearGradient>
    <linearGradient id="ring-glow" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#E8C56A"/>
    </linearGradient>
    <linearGradient id="wind-grad" x1="54" y1="40" x2="54" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B9BD5"/>
      <stop offset="100%" stop-color="#A8C8E8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <g id="background">
    <rect width="108" height="108" fill="url(#bg)"/>
  </g>

  <!-- Foreground -->
  <g id="foreground">
    <!-- Outer glow ring -->
    <circle cx="54" cy="54" r="29.5" fill="none" stroke="#D4A843" stroke-width="0.4" opacity="0.2"/>

    <!-- Main clock circle -->
    <circle cx="54" cy="54" r="27" fill="none" stroke="url(#ring-glow)" stroke-width="2"/>

    <!-- Major tick marks (12, 3, 6, 9) -->
    <line x1="54" y1="27" x2="54" y2="32" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
    <line x1="81" y1="54" x2="76" y2="54" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
    <line x1="54" y1="81" x2="54" y2="76" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="54" x2="32" y2="54" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>

    <!-- Minor tick marks -->
    <line x1="67.5" y1="30.62" x2="65.75" y2="33.65" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="77.38" y1="40.5" x2="74.36" y2="42.25" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="77.38" y1="67.5" x2="74.36" y2="65.75" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="67.5" y1="77.38" x2="65.75" y2="74.36" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="40.5" y1="77.38" x2="42.25" y2="74.36" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="30.62" y1="67.5" x2="33.65" y2="65.75" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="30.62" y1="40.5" x2="33.65" y2="42.25" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="40.5" y1="30.62" x2="42.25" y2="33.65" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.55"/>

    <!-- Triskelion wind spirals — replacing clock hands -->
    <g transform="translate(54,54)">
      <!-- Arm 1: upward, curving clockwise -->
      <path d="M0,-2 C5,-6 9,-12 5,-18"
            fill="none" stroke="#5B9BD5" stroke-width="2" stroke-linecap="round"/>
      <!-- Arm 2: rotated 120° -->
      <path d="M0,-2 C5,-6 9,-12 5,-18"
            fill="none" stroke="#5B9BD5" stroke-width="2" stroke-linecap="round"
            transform="rotate(120)"/>
      <!-- Arm 3: rotated 240° -->
      <path d="M0,-2 C5,-6 9,-12 5,-18"
            fill="none" stroke="#5B9BD5" stroke-width="2" stroke-linecap="round"
            transform="rotate(240)"/>
    </g>

    <!-- Center dot -->
    <circle cx="54" cy="54" r="2.5" fill="#D4A843"/>
  </g>

  <!-- Monochrome layer -->
  <g id="monochrome" display="none">
    <circle cx="54" cy="54" r="27" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="54" y1="27" x2="54" y2="32" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="81" y1="54" x2="76" y2="54" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="54" y1="81" x2="54" y2="76" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="54" x2="32" y2="54" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="67.5" y1="30.62" x2="65.75" y2="33.65" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="77.38" y1="40.5" x2="74.36" y2="42.25" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="77.38" y1="67.5" x2="74.36" y2="65.75" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="67.5" y1="77.38" x2="65.75" y2="74.36" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="40.5" y1="77.38" x2="42.25" y2="74.36" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="30.62" y1="67.5" x2="33.65" y2="65.75" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="30.62" y1="40.5" x2="33.65" y2="42.25" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="40.5" y1="30.62" x2="42.25" y2="33.65" stroke="#FFF" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <g transform="translate(54,54)">
      <path d="M0,-2 C5,-6 9,-12 5,-18" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M0,-2 C5,-6 9,-12 5,-18" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" transform="rotate(120)"/>
      <path d="M0,-2 C5,-6 9,-12 5,-18" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" transform="rotate(240)"/>
    </g>
    <circle cx="54" cy="54" r="2.5" fill="#FFFFFF"/>
  </g>

</svg>
